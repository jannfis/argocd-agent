syntax = "proto3";
option go_package = "github.com/jannfis/argocd-application-agent/internal/server;server";

package server;

import "google/api/annotations.proto";

message AuthRequest {
    string username = 1;
    string password = 2;
    string agentName = 3;
}

message AuthResponse {
    string result = 1;
    string token = 2;
}

service Server {
    rpc Authenticate(AuthRequest) returns (AuthResponse) {
        option (google.api.http) = {
            post: "/api/v1/authenticate"
            body: "auth"
        };
    }
}